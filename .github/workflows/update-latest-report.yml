name: Update website to latest weekly report

on:
  push:
    branches:
      - main
    paths:
      - "reports/**"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-weekly-index
  cancel-in-progress: true

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest and previous reports
        id: reports
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t report_dirs < <(
            find reports \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -name 'w*-reports' \
              -printf '%f\n' |
            sort -V
          )

          report_count=${#report_dirs[@]}

          if [ "$report_count" -eq 0 ]; then
            echo "No wN-reports folders found under reports/."
            exit 1
          fi

          latest_dir="${report_dirs[$((report_count - 1))]}"
          latest_path="reports/$latest_dir"

          latest_html=$(
            find "$latest_path" \
              -maxdepth 1 \
              -type f \
              -name '老板版_*.html' |
            sort |
            tail -n 1
          )

          if [ -z "$latest_html" ]; then
            echo "No 老板版 HTML found in $latest_path."
            exit 1
          fi

          echo "Latest folder: $latest_dir"
          echo "Latest HTML: $latest_html"

          echo "latest_dir=$latest_dir" >> "$GITHUB_OUTPUT"
          echo "latest_html=$latest_html" >> "$GITHUB_OUTPUT"

          if [ "$report_count" -ge 2 ]; then
            previous_dir="${report_dirs[$((report_count - 2))]}"
            previous_path="reports/$previous_dir"

            previous_html=$(
              find "$previous_path" \
                -maxdepth 1 \
                -type f \
                -name '老板版_*.html' |
              sort |
              tail -n 1
            )

            if [ -z "$previous_html" ]; then
              echo "No 老板版 HTML found in $previous_path."
              exit 1
            fi

            previous_number="${previous_dir#w}"
            previous_number="${previous_number%-reports}"
            previous_week="W$previous_number"

            echo "Previous folder: $previous_dir"
            echo "Previous HTML: $previous_html"
            echo "Previous week: $previous_week"

            echo "has_previous=true" >> "$GITHUB_OUTPUT"
            echo "previous_dir=$previous_dir" >> "$GITHUB_OUTPUT"
            echo "previous_html=$previous_html" >> "$GITHUB_OUTPUT"
            echo "previous_week=$previous_week" >> "$GITHUB_OUTPUT"
          else
            echo "No previous report found."
            echo "has_previous=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy latest report to index.html
        shell: bash
        run: |
          set -euo pipefail

          cp "${{ steps.reports.outputs.latest_html }}" index.html

          echo "Copied:"
          echo "${{ steps.reports.outputs.latest_html }}"
          echo "to index.html"

      - name: Inject previous-week button into index.html
        if: steps.reports.outputs.has_previous == 'true'
        shell: bash
        env:
          PREVIOUS_HTML: ${{ steps.reports.outputs.previous_html }}
          PREVIOUS_WEEK: ${{ steps.reports.outputs.previous_week }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          from pathlib import Path

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          marker = "<!-- PREVIOUS_WEEK_BUTTON -->"

          if marker not in html:
              raise SystemExit(
                  "PREVIOUS_WEEK_BUTTON marker not found in latest HTML."
              )

          previous_html = os.environ["PREVIOUS_HTML"]
          previous_week = os.environ["PREVIOUS_WEEK"]

          button = f'''
          <a
            href="{previous_html}"
            style="
              display:inline-block;
              margin-top:18px;
              padding:12px 16px;
              border:1px solid var(--light-gray);
              border-radius:8px;
              background:var(--ivory-deep);
              color:var(--ink);
              font-size:14px;
              font-weight:500;
              letter-spacing:.02em;
              line-height:1.3;
              text-decoration:none;
            "
          >← {previous_week} 周报</a>
          '''.strip()

          html = html.replace(marker, button, 1)
          index_path.write_text(html, encoding="utf-8")

          print(
              f"Injected previous-week button: "
              f"{previous_week} -> {previous_html}"
          )
          PY

      - name: Remove unused marker when no previous report exists
        if: steps.reports.outputs.has_previous != 'true'
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          html = index_path.read_text(encoding="utf-8")

          html = html.replace(
              "<!-- PREVIOUS_WEEK_BUTTON -->",
              "",
          )

          index_path.write_text(html, encoding="utf-8")
          PY

      - name: Verify generated index.html
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -s index.html ]; then
            echo "index.html is missing or empty."
            exit 1
          fi

          if grep -q '<!-- PREVIOUS_WEEK_BUTTON -->' index.html; then
            echo "Unprocessed button marker remains in index.html."
            exit 1
          fi

          echo "Generated index.html successfully."

      - name: Commit updated index.html
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html

          if git diff --cached --quiet; then
            echo "index.html is already current."
            exit 0
          fi

          git commit -m "Update website to latest weekly report"
          git push
