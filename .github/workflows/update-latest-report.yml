name: Update website to latest weekly report

on:
  push:
    branches: [main]
    paths:
      - "reports/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build latest page and one-week navigation
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t WEEK_DIRS < <(
            while IFS= read -r dir; do
              if [[ "$dir" =~ /w([0-9]+)-reports$ ]]; then
                printf '%s\t%s\n' "${BASH_REMATCH[1]}" "$dir"
              fi
            done < <(find reports -mindepth 1 -maxdepth 1 -type d -name 'w*-reports' -print) |
              sort -n -k1,1
          )

          if (( ${#WEEK_DIRS[@]} == 0 )); then
            echo "No reports/wN-reports directories found."
            exit 1
          fi

          latest_entry="${WEEK_DIRS[-1]}"
          latest_week="${latest_entry%%$'\t'*}"
          latest_dir="${latest_entry#*$'\t'}"
          latest_html="$(find "$latest_dir" -maxdepth 1 -type f -name '老板版_*.html' -print -quit)"

          if [[ -z "$latest_html" ]]; then
            echo "No 老板版_*.html found in $latest_dir"
            exit 1
          fi

          previous_week=""
          previous_dir=""
          previous_html=""
          if (( ${#WEEK_DIRS[@]} >= 2 )); then
            previous_entry="${WEEK_DIRS[-2]}"
            previous_week="${previous_entry%%$'\t'*}"
            previous_dir="${previous_entry#*$'\t'}"
            previous_html="$(find "$previous_dir" -maxdepth 1 -type f -name '老板版_*.html' -print -quit)"
            if [[ -z "$previous_html" ]]; then
              echo "No 老板版_*.html found in $previous_dir"
              exit 1
            fi
          fi

          export LATEST_WEEK="$latest_week"
          export LATEST_HTML="$latest_html"
          export PREVIOUS_WEEK="$previous_week"
          export PREVIOUS_HTML="$previous_html"

          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          marker = "<!-- PREVIOUS_WEEK_BUTTON -->"
          start = "<!-- WEEKLY_NAV_START -->"
          end = "<!-- WEEKLY_NAV_END -->"
          generated_nav = re.compile(
              re.escape(start) + r".*?" + re.escape(end),
              flags=re.DOTALL,
          )

          report_files = list(Path("reports").glob("w*-reports/老板版_*.html"))
          for path in report_files:
              html = path.read_text(encoding="utf-8")
              html = generated_nav.sub(marker, html)
              path.write_text(html, encoding="utf-8")

          latest_week = os.environ["LATEST_WEEK"]
          latest_path = Path(os.environ["LATEST_HTML"])
          latest_html = latest_path.read_text(encoding="utf-8")
          if marker not in latest_html:
              raise SystemExit(f"Marker missing in latest report: {latest_path}")

          previous_week = os.environ.get("PREVIOUS_WEEK", "")
          previous_name = os.environ.get("PREVIOUS_HTML", "")

          if previous_week and previous_name:
              previous_path = Path(previous_name)
              previous_href = previous_path.as_posix()
              back_button = (
                  f'{start}<a class="previous-button" href="{previous_href}">'
                  f'← W{previous_week} 周报</a>{end}'
              )
              index_html = latest_html.replace(marker, back_button, 1)

              previous_html = previous_path.read_text(encoding="utf-8")
              if marker not in previous_html:
                  raise SystemExit(f"Marker missing in previous report: {previous_path}")
              forward_button = (
                  f'{start}<a class="previous-button" href="../../index.html">'
                  f'W{latest_week} 周报 →</a>{end}'
              )
              previous_path.write_text(
                  previous_html.replace(marker, forward_button, 1),
                  encoding="utf-8",
              )
          else:
              index_html = latest_html.replace(marker, "", 1)

          Path("index.html").write_text(index_html, encoding="utf-8")
          print(f"Published W{latest_week} to index.html")
          if previous_week:
              print(f"Navigation enabled only between W{latest_week} and W{previous_week}")
          PY

      - name: Verify generated links
        shell: bash
        run: |
          set -euo pipefail
          test -s index.html
          if grep -q '<!-- PREVIOUS_WEEK_BUTTON -->' index.html; then
            echo "Unresolved navigation marker remains in index.html"
            exit 1
          fi

      - name: Commit generated pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html reports/
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Update latest weekly report navigation"
          git push
